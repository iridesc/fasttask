[program:redis]
command=redis-server --bind %(ENV_MASTER_HOST)s --requirepass %(ENV_TASK_QUEUE_PASSWD)s --port %(ENV_TASK_QUEUE_PORT)s --dir %(ENV_REDIS_DIR)s --timeout 0
directory=%(ENV_FASTTASK_DIR)s
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
startsecs=5
priority=100
