[supervisord]
nodaemon=true

[program:redis]
command=redis-server --bind %(ENV_MASTER_HOST)s --requirepass %(ENV_TASK_QUEUE_PASSWD)s --port %(ENV_TASK_QUEUE_PORT)s --dir %(ENV_REDIS_DIR)s --timeout 0
directory=%(ENV_FASTTASK_DIR)s
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
startsecs=5
priority=100

[program:uvicorn]
command=uvicorn api:app --host %(ENV_MASTER_HOST)s --port 443 --workers %(ENV_UVICORN_WORKERS)s --ssl-keyfile %(ENV_SSL_KEYFILE)s --ssl-certfile %(ENV_SSL_CERTFILE)s
directory=%(ENV_FASTTASK_DIR)s
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
startsecs=5
priority=500

[program:flower]
command=celery -A celery_app flower --address=127.0.0.1 --port=%(ENV_FLOWER_PORT)s --url_prefix=flower --max_tasks=%(ENV_FLOWER_MAX_TASKS)s
directory=%(ENV_FASTTASK_DIR)s
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
startsecs=5
priority=600