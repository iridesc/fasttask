[supervisord]
nodaemon=true

[program:celery]
command=celery -A celery_app worker -E --without-gossip --without-mingle
directory=%(ENV_FASTTASK_DIR)s
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
startsecs=5

[program:flower]
command=celery -A celery_app flower --address=127.0.0.1 --port=%(ENV_FLOWER_PORT)s --url_prefix=flower
directory=%(ENV_FASTTASK_DIR)s
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
startsecs=5
priority=600